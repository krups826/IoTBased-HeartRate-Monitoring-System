<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartBeat Monitor - Profile</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 500px;
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .profile-label {
            color: var(--text-muted);
        }

        .profile-value {
            font-weight: 600;
            font-size: 1.1rem;
        }
    </style>
</head>

<body class="dashboard-page dark-theme">

    <div class="sidebar glass-panel">
        <div class="sidebar-header">
            <span class="heart-icon">💖</span>
            <h3>PulseSync</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="profile.html" class="nav-item active">👤 Profile</a>
            <a href="history.html" class="nav-item">📈 Ratings History</a>
            <a href="alerts.html" class="nav-item">🚨 Alerts</a>
            <a href="feedback.html" class="nav-item">💬 Feedback</a>
        </nav>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="btn btn-danger btn-block">Logout</button>
        </div>
    </div>

    <main class="main-content">
        <header class="top-section glass-panel">
            <h2>User Profile</h2>
        </header>

        <section class="center-section glass-panel">
            <div style="text-align: center; margin-bottom: 2rem;">
                <label for="avatarUpload" style="cursor: pointer; display: inline-block; position: relative;">
                    <img src="" id="profileAvatar" alt="Avatar"
                        style="border-radius: 50%; border: 4px solid var(--primary); box-shadow: 0 0 20px rgba(0,255,136,0.3); width: 120px; height: 120px; object-fit: cover;">
                    <div
                        style="position: absolute; bottom: 0; right: 0; background: var(--primary); color: #000; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                        📷
                    </div>
                </label>
                <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">Click to change picture</p>
            </div>
            <div class="profile-card" style="margin: 0 auto;">
                <div class="profile-row">
                    <span class="profile-label">Name</span>
                    <span class="profile-value" id="profileName">Loading...</span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">Age</span>
                    <span class="profile-value" id="profileAge">Loading...</span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">Email</span>
                    <span class="profile-value" id="profileEmail">Loading...</span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">Account ID</span>
                    <span class="profile-value" id="profileId">Loading...</span>
                </div>
            </div>
        </section>
    </main>
    <aside class="right-panel glass-panel"></aside>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!ApiService.getToken()) window.location.href = 'login.html';

            const userInfo = JSON.parse(localStorage.getItem('user_info'));
            if (userInfo) {
                document.getElementById('profileName').textContent = userInfo.firstName;
                // Safely handle cases where age might not have been cached yet
                document.getElementById('profileAge').textContent = userInfo.age ? (userInfo.age + ' years old') : 'Not provided';
                document.getElementById('profileEmail').textContent = userInfo.email;
                document.getElementById('profileId').textContent = '#' + userInfo.id;
                // Check if user has uploaded a custom picture
                const savedPic = localStorage.getItem('profile_pic');
                if (savedPic) {
                    document.getElementById('profileAvatar').src = savedPic;
                } else {
                    document.getElementById('profileAvatar').src = `https://ui-avatars.com/api/?name=${userInfo.firstName}&background=00ff88&color=000&size=120`;
                }
            }

            // Handle Avatar Upload Logic
            document.getElementById('avatarUpload').addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        const base64Data = event.target.result;
                        // Save offline so it persists across refreshes
                        localStorage.setItem('profile_pic', base64Data);
                        document.getElementById('profileAvatar').src = base64Data;
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                ApiService.clearAuth();
                window.location.href = 'login.html';
            });
        });
    </script>
</body>

</html>
